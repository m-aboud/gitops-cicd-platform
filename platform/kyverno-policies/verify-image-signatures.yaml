apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signatures
  annotations:
    policies.kyverno.io/title: Verify image signatures (Cosign keyless)
    policies.kyverno.io/category: Supply Chain
    policies.kyverno.io/severity: critical
    policies.kyverno.io/description: >-
      Container images deployed to demo-* namespaces must be signed by the
      GitHub Actions workflow in this repository using Cosign keyless OIDC.
      Unsigned images, or images signed by an unexpected identity, are rejected.
spec:
  validationFailureAction: Enforce
  webhookTimeoutSeconds: 30
  failurePolicy: Fail
  rules:
    - name: verify-cosign-signature
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - "demo-*"
      verifyImages:
        - imageReferences:
            - "ghcr.io/mohammedabood/*"
          attestors:
            - entries:
                - keyless:
                    subject: "https://github.com/mohammedabood/gitops-cicd-platform/.github/workflows/ci.yml@refs/heads/main"
                    issuer: "https://token.actions.githubusercontent.com"
                    rekor:
                      url: "https://rekor.sigstore.dev"
