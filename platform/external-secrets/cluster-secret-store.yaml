# ClusterSecretStore — points External Secrets Operator at AWS Secrets Manager.
# Auth is via IRSA: the ESO service account assumes an IAM role with
# secretsmanager:GetSecretValue. Configure the IAM role in Terraform.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
