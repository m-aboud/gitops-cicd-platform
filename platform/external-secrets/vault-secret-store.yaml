# ClusterSecretStore — points External Secrets Operator at HashiCorp Vault.
#
# Use this *instead of* (or alongside) aws-secrets-manager when:
#   - You need cloud-agnostic secrets (on-prem + multi-cloud)
#   - You need dynamic, short-lived credentials (DB, AWS, Azure, PKI)
#   - Vault is already a mandated standard in the target environment
#
# Auth options (this example uses Kubernetes auth):
#   - kubernetes — ESO authenticates to Vault using its ServiceAccount JWT
#   - token      — static token (simpler, less safe)
#   - approle    — username/secret-id style
#   - aws        — IAM-based, for AWS-hosted Vault
#
# See ADR-004 for the trade-off vs cloud-native secret stores.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "https://vault.vault.svc.cluster.local:8200"
      path: "secret"          # KV v2 mount path
      version: "v2"
      caBundle: ""            # base64-encoded CA if Vault uses a private cert
      auth:
        kubernetes:
          mountPath: "kubernetes"   # auth method mount in Vault
          role: "external-secrets"  # Vault role bound to the ESO SA
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
