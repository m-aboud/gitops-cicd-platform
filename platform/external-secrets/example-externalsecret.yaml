# Example ExternalSecret — syncs a secret from AWS Secrets Manager into the
# demo-prod namespace as a regular Kubernetes Secret.
#
# In AWS Secrets Manager, store a JSON secret named `prod/demo-api` with shape:
#   { "DB_PASSWORD": "...", "API_KEY": "..." }
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: demo-api-secrets
  namespace: demo-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager

  target:
    name: demo-api-secrets        # name of the created K8s Secret
    creationPolicy: Owner

  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: prod/demo-api
        property: DB_PASSWORD
    - secretKey: API_KEY
      remoteRef:
        key: prod/demo-api
        property: API_KEY
