# Two examples:
#
#   1) Static KV secret  — equivalent to the AWS Secrets Manager pattern.
#   2) Dynamic DB credentials — Vault issues short-lived (e.g. 1h) credentials
#      and ESO refreshes them automatically. This is the case for Vault.
#
# In Vault, run once:
#   vault kv put secret/prod/demo-api DB_PASSWORD=... API_KEY=...
#
# For dynamic DB:
#   vault secrets enable -path=database database
#   vault write database/config/postgres \
#     plugin_name=postgresql-database-plugin \
#     allowed_roles="demo-api" \
#     connection_url="postgresql://{{username}}:{{password}}@db:5432/postgres" \
#     username="admin" password="..."
#   vault write database/roles/demo-api \
#     db_name=postgres \
#     creation_statements="CREATE ROLE \"{{name}}\" WITH LOGIN PASSWORD '{{password}}' VALID UNTIL '{{expiration}}'; \
#                          GRANT SELECT ON ALL TABLES IN SCHEMA public TO \"{{name}}\";" \
#     default_ttl=1h max_ttl=24h
---
# 1) Static KV secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: demo-api-secrets-vault
  namespace: demo-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: demo-api-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: prod/demo-api
        property: DB_PASSWORD
    - secretKey: API_KEY
      remoteRef:
        key: prod/demo-api
        property: API_KEY
---
# 2) Dynamic database credentials (Vault-only capability)
# ESO requests a fresh credential pair from Vault; rotated automatically.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: demo-api-db-dynamic
  namespace: demo-prod
spec:
  refreshInterval: 30m   # refresh well before the TTL
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: demo-api-db
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        DATABASE_URL: "postgresql://{{ .username }}:{{ .password }}@db.demo-prod.svc:5432/app"
  dataFrom:
    - extract:
        key: "database/creds/demo-api"   # Vault dynamic-secret path
