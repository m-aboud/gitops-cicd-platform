# ApplicationSet — generates one Argo CD Application per environment overlay.
#
# The "git" generator scans deployments/apps/demo-api/overlays/* and templates
# an Application for each directory found. Adding a new environment is then
# just `mkdir overlays/newenv && commit`.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: demo-api
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/mohammedabood/gitops-cicd-platform
        revision: main
        directories:
          - path: deployments/apps/demo-api/overlays/*

  template:
    metadata:
      name: "demo-api-{{path.basename}}"
      labels:
        app.kubernetes.io/name: demo-api
        environment: "{{path.basename}}"
    spec:
      project: demo
      source:
        repoURL: https://github.com/mohammedabood/gitops-cicd-platform
        targetRevision: main
        path: "{{path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "demo-{{path.basename}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - PruneLast=true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m

  # Prod gets a stricter policy — only "create" by ApplicationSet,
  # never auto-update or auto-delete.
  syncPolicy:
    applicationsSync: create-update
    preserveResourcesOnDeletion: true
