# SonarCloud configuration.
#
# Before this works:
#   1. Create the project at sonarcloud.io
#   2. Save SONAR_TOKEN as a GitHub repository secret
#   3. Replace organisation key below with your SonarCloud org
#
# Self-hosted SonarQube alternative: set SONAR_HOST_URL and SONAR_TOKEN; the
# scanner action works against both.

sonar.organization=mohammedabood
sonar.projectKey=mohammedabood_gitops-cicd-platform
sonar.projectName=GitOps CI/CD Platform
sonar.projectVersion=0.1.0

# Scope: only scan the sample application source — infra YAML and manifests
# are scanned by other tools (tflint, kubeconform, kyverno) better suited to them.
sonar.sources=apps/demo-api/app
sonar.tests=apps/demo-api/tests

# Python settings
sonar.python.version=3.11
sonar.python.coverage.reportPaths=apps/demo-api/coverage.xml

# Exclusions
sonar.exclusions=**/__pycache__/**,**/*.md,**/Dockerfile,**/.venv/**

# Quality gate behaviour
sonar.qualitygate.wait=true
