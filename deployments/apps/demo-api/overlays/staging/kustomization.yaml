apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: demo-staging

resources:
  - ../../base

images:
  - name: ghcr.io/mohammedabood/demo-api
    newTag: "0.1.0-rc1"

commonLabels:
  environment: staging

patches:
  - target: { kind: Deployment, name: demo-api }
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/template/spec/containers/0/env/1/value
        value: "Hello from STAGING"
