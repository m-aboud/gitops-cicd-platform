apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: demo-dev

resources:
  - ../../base

images:
  - name: ghcr.io/mohammedabood/demo-api
    newTag: "0.1.0-dev"

commonLabels:
  environment: dev

patches:
  - target: { kind: Deployment, name: demo-api }
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/env/1/value
        value: "Hello from DEV"
