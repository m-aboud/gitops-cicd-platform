apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: demo-api
  labels:
    app.kubernetes.io/name: demo-api
spec:
  replicas: 4
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/mohammedabood/demo-api:0.1.0
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: APP_VERSION
              value: "0.1.0"
            - name: GREETING
              value: "Hello from PROD"
            - name: FAIL_RATE
              value: "0.0"
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 256Mi }
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 2
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

  strategy:
    canary:
      maxUnavailable: 0
      maxSurge: 25%

      # Service used by the canary ReplicaSet (created via kustomize patch).
      canaryService: demo-api-canary
      stableService: demo-api

      # Progressive traffic-shifting steps.
      steps:
        - setWeight: 5
        - pause:
            duration: 2m

        - setWeight: 25
        - pause:
            duration: 5m

        # First analysis gate — abort if success rate drops.
        - analysis:
            templates:
              - templateName: success-rate
            args:
              - name: service-name
                value: demo-api-canary

        - setWeight: 50
        - pause:
            duration: 5m

        - setWeight: 75
        - pause:
            duration: 3m

        # Final pre-promotion analysis gate.
        - analysis:
            templates:
              - templateName: success-rate
            args:
              - name: service-name
                value: demo-api-canary
